dist: bionic
jobs:
  include:
    - language: python
      python:
        - "3.6"      # current default Python on Travis CI
        - "3.7"
        - "3.8"
      install: 
        - pip install -U pip setuptools wheel
        - pip install -r requirements.txt
      script: 
        - make lint
        
    - language: julia
      julia:
        - 1.0.5
        - 1.3.1
      script:
        - julia --project=julia/src -e 'using Pkg; Pkg.instantiate(); Pkg.build();'
